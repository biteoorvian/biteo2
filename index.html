<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biteo">
<meta name="theme-color" content="#133D31">
<title>Biteo – velín</title>
<style>
  :root{
    --green:#1F5F4B; --greenDk:#133D31; --greenLt:#2E7D5B; --cream:#F5F1E8;
    --card:#FFFFFF; --ink:#16241E; --sub:#5C6B63; --line:#E6E1D4;
    --amber:#BE7A1B; --red:#B4452F; --blue:#3E6E8E;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--cream);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px}
  input,select,button{font-family:inherit;font-size:15px}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  aside{background:var(--greenDk);width:230px;flex-shrink:0;padding:16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .logo{display:flex;align-items:center;gap:10px;padding:12px 8px 16px}
  .logo .b{width:38px;height:38px;border-radius:12px;background:var(--cream);color:var(--greenDk);display:grid;place-items:center;font-weight:800;font-size:20px}
  .logo .t{color:var(--cream);font-weight:700;line-height:1.1}
  .logo .s{color:#9DB6AB;font-size:11px}
  .navbtn{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;color:#C7D6CE;background:none;border:none;cursor:pointer;text-align:left;font-weight:500;width:100%}
  .navbtn.on{background:var(--green);color:#fff}
  .navbtn .badge{margin-left:auto;background:var(--amber);color:#fff;font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px}
  .foot{margin-top:auto;color:#7E988C;font-size:11px;padding:12px 8px}
  /* bottom nav mobile */
  .bottomnav{display:none}
  main{flex:1;padding:28px;max-width:1100px;width:100%;margin:0 auto}
  h1{font-size:24px;font-weight:800;margin:0}
  .sub{color:var(--sub);font-size:14px}
  .head{margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
  .row{display:flex;flex-wrap:wrap;gap:12px}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .stat{flex:1;min-width:150px}
  .stat .l{color:var(--sub);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:24px;font-weight:800;margin-top:4px}
  .stat .x{color:var(--sub);font-size:12px;margin-top:4px}
  .pill{font-size:12px;font-weight:700;padding:2px 9px;border-radius:99px;white-space:nowrap;display:inline-block}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:12px;font-weight:700;border:none;cursor:pointer;background:var(--green);color:#fff;font-size:14px}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--sub)}
  .btn.danger{background:none;color:var(--red)}
  .btn:disabled{background:var(--line);cursor:default}
  .bar{height:8px;border-radius:99px;background:var(--line);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:99px}
  label{color:var(--sub);font-size:12px;font-weight:600;display:block;margin-bottom:4px}
  .in{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--line);color:var(--ink);outline:none;background:#fff}
  .in.bold{font-weight:700}
  .link{color:var(--green);font-weight:600;background:none;border:none;cursor:pointer;font-size:14px;padding:0;margin-bottom:12px}
  .fcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left;cursor:pointer;width:100%}
  .muted{color:var(--sub)}
  .chip{padding:8px 12px;border-radius:12px;font-weight:600;font-size:14px;border:1px solid var(--line);background:#fff;color:var(--sub);cursor:pointer}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  .sync{display:inline-flex;align-items:center;gap:6px;background:rgba(62,110,142,.1);color:var(--blue);font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px}
  /* simple bar chart */
  .chart{display:flex;align-items:flex-end;gap:6px;height:170px;padding-top:8px}
  .chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
  .chart .col i{width:100%;max-width:26px;border-radius:5px 5px 0 0;display:block}
  .chart .col span{font-size:10px;color:var(--sub)}
  .hbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px}
  .hbar .nm{width:84px;flex-shrink:0;color:var(--sub)}
  .hbar .tk{flex:1;height:18px;background:var(--line);border-radius:6px;overflow:hidden}
  .hbar .tk>i{display:block;height:100%;border-radius:6px}
  .hbar .vl{width:64px;text-align:right;font-weight:700}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:var(--greenDk);color:#fff;padding:10px 16px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:60}
  svg.ic{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  @media (max-width:820px){
    aside{display:none}
    main{padding:16px;padding-bottom:84px}
    .g3{grid-template-columns:1fr}
    .g2{grid-template-columns:1fr}
    .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--greenDk);z-index:40;overflow-x:auto;padding-bottom:env(safe-area-inset-bottom)}
    .bottomnav button{flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:none;border:none;color:#9DB6AB;cursor:pointer}
    .bottomnav button.on{color:#fff}
    .bottomnav button span{font-size:9px;white-space:nowrap}
    .bottomnav .badge{position:absolute;top:2px;margin-left:18px;background:var(--amber);color:#fff;font-size:8px;font-weight:700;padding:0 5px;border-radius:99px}
  }
</style>
</head>
<body>
<div class="app">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>
<div class="bottomnav" id="bottomnav"></div>

<script>
/* ================= data ================= */
var C={green:"#1F5F4B",greenDk:"#133D31",greenLt:"#2E7D5B",cream:"#F5F1E8",card:"#fff",ink:"#16241E",sub:"#5C6B63",line:"#E6E1D4",amber:"#BE7A1B",red:"#B4452F",blue:"#3E6E8E"};
var CAT_EMOJI={"Jídlo":"🍱","Pití":"🥤","Svačina":"🥪","Snack":"🍫"};
var CATS=Object.keys(CAT_EMOJI);
var MONTHS=["led","úno","bře","dub","kvě","čen","čec","srp","zář","říj","lis","pro"];
function fmt(n){return new Intl.NumberFormat("cs-CZ").format(Math.round(n));}
function ago(d){var x=new Date();x.setDate(x.getDate()-d);return x.toISOString().slice(0,10);}
function daysSince(iso){return Math.floor((Date.now()-new Date(iso).getTime())/86400000);}

var DEFAULT_SETTINGS={marze:40,polozekNakup:1.5,plytvani:0.15,poplatek:5000,fix:10000,ostatni:3000,dan:0.21,dny:26};
var DEFAULT_CATALOG=[
 {id:1,name:"Teplé jídlo – guláš",cat:"Jídlo",img:null,trvanlivost:3,nakup:69,prodej:129,dph:12},
 {id:2,name:"Velký salát s proteinem",cat:"Jídlo",img:null,trvanlivost:2,nakup:58,prodej:109,dph:12},
 {id:3,name:"Bageta / sendvič",cat:"Jídlo",img:null,trvanlivost:5,nakup:36,prodej:79,dph:12},
 {id:4,name:"Wrap / tortilla",cat:"Jídlo",img:null,trvanlivost:4,nakup:42,prodej:89,dph:12},
 {id:5,name:"Energetický nápoj",cat:"Pití",img:null,trvanlivost:270,nakup:22,prodej:49,dph:21},
 {id:6,name:"Voda 0,5 l",cat:"Pití",img:null,trvanlivost:365,nakup:10,prodej:27,dph:12},
 {id:7,name:"Ledová káva",cat:"Pití",img:null,trvanlivost:30,nakup:21,prodej:45,dph:12},
 {id:8,name:"Jogurt / skyr",cat:"Svačina",img:null,trvanlivost:14,nakup:16,prodej:39,dph:12},
 {id:9,name:"Proteinová tyčinka",cat:"Snack",img:null,trvanlivost:180,nakup:23,prodej:49,dph:21},
 {id:10,name:"Oříšky / směs",cat:"Snack",img:null,trvanlivost:120,nakup:24,prodej:52,dph:12}
];
var DEFAULT_FRIDGES=[
 {id:1,name:"Firma Kružík (pilot)",city:"Kroměříž",route:"KM-město",lide:100,pen:0.14,status:"aktivní"},
 {id:2,name:"Magneton a.s.",city:"Kroměříž",route:"KM-průmysl",lide:300,pen:0.16,status:"aktivní"},
 {id:3,name:"PLASTIKA a.s.",city:"Kroměříž",route:"KM-průmysl",lide:250,pen:0.13,status:"aktivní"},
 {id:4,name:"Kroměřížská nemocnice",city:"Kroměříž",route:"KM-město",lide:300,pen:0.18,status:"aktivní"},
 {id:5,name:"TOSHULIN a.s.",city:"Hulín",route:"KM-průmysl",lide:550,pen:0.12,status:"zvažuji"}
];
var STOCK={
 1:[{pid:1,qty:2,max:10,r:ago(2)},{pid:3,qty:4,max:12,r:ago(3)},{pid:5,qty:9,max:20,r:ago(1)},{pid:6,qty:14,max:24,r:ago(1)},{pid:9,qty:6,max:18,r:ago(5)},{pid:8,qty:3,max:12,r:ago(1)}],
 2:[{pid:1,qty:1,max:14,r:ago(2)},{pid:5,qty:5,max:24,r:ago(1)},{pid:7,qty:2,max:16,r:ago(2)},{pid:3,qty:8,max:16,r:ago(1)}],
 3:[{pid:6,qty:20,max:24,r:ago(1)},{pid:4,qty:6,max:14,r:ago(1)},{pid:5,qty:11,max:20,r:ago(1)}],
 4:[{pid:2,qty:3,max:12,r:ago(1)},{pid:7,qty:9,max:18,r:ago(1)},{pid:3,qty:5,max:16,r:ago(1)},{pid:6,qty:16,max:24,r:ago(1)}],
 5:[]
};

/* persistence */
function load(k,def){try{var v=localStorage.getItem("biteo_"+k);return v?JSON.parse(v):def;}catch(e){return def;}}
function save(k,v){try{localStorage.setItem("biteo_"+k,JSON.stringify(v));}catch(e){}}
var S=load("settings",DEFAULT_SETTINGS);
var CATALOG=load("catalog",DEFAULT_CATALOG);
var FRIDGES=load("fridges",DEFAULT_FRIDGES);

/* ================= logic ================= */
function finance(p){
 var npd=Math.round(p.lide*p.pen), npm=npd*p.dny;
 var hruba=npm*p.marze*p.polozekNakup, poply=hruba*(1-p.plytvani);
 var pred=poply+p.poplatek-p.fix-p.ostatni, dan=pred>0?pred*p.dan:0, net=pred-dan;
 var be=(p.fix+p.ostatni-p.poplatek)<=0?0:((p.fix+p.ostatni-p.poplatek)/((1-p.plytvani)*p.marze*p.polozekNakup))/p.dny;
 return {npd:npd,net:net,pred:pred,be:be,rez:npd-be};
}
function ff(f){if(f.status!=="aktivní")return null;var o={};for(var k in S)o[k]=S[k];o.lide=f.lide;o.pen=f.pen;return finance(o);}
function verdict(net){return net>=40000?{t:"A – jednoznačně",c:C.green}:net>=15000?{t:"B – ano",c:C.green}:net>=3000?{t:"C – jen na trase",c:C.amber}:net>0?{t:"D – hraniční",c:C.amber}:{t:"NE – ztráta",c:C.red};}
function prodMap(){var m={};CATALOG.forEach(function(p){m[p.id]=p;});return m;}
function alerts(){
 var P=prodMap(),out=[];
 FRIDGES.filter(function(f){return f.status==="aktivní";}).forEach(function(f){
  (STOCK[f.id]||[]).forEach(function(it){var p=P[it.pid];if(!p)return;var left=p.trvanlivost-daysSince(it.r);
   if(it.qty/it.max<=0.3)out.push({fid:f.id,type:"stock",fridge:f.name,route:f.route,city:f.city,item:p.name,qty:it.qty});
   if(left<=1)out.push({fid:f.id,type:"exp",fridge:f.name,route:f.route,city:f.city,item:p.name,left:left});});
 });
 return out;
}

/* ================= icons ================= */
var IC={
 dashboard:'<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>',
 fridge:'<rect x="5" y="2" width="14" height="20" rx="2"/><line x1="5" y1="10" x2="19" y2="10"/><line x1="8" y1="6" x2="8" y2="6.01"/>',
 truck:'<rect x="1" y="6" width="13" height="10" rx="1"/><path d="M14 9h4l3 3v4h-7z"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/>',
 tag:'<path d="M20.59 13.41 13.42 20.6a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1"/>',
 settings:'<circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/>',
 compass:'<circle cx="12" cy="12" r="10"/><polygon points="16 8 10 10 8 16 14 14 16 8"/>',
 pin:'<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/>',
 plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
 check:'<polyline points="20 6 9 17 4 12"/>',
 trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>',
 image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
 search:'<circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
 copy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
 pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>',
 refresh:'<path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>',
 trending:'<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
 clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
 package:'<path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/>'
};
function ic(name,size){return '<svg class="ic" viewBox="0 0 24 24"'+(size?' style="width:'+size+'px;height:'+size+'px"':'')+'>'+(IC[name]||'')+'</svg>';}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pill(txt,color){return '<span class="pill" style="background:'+color+'1A;color:'+color+'">'+esc(txt)+'</span>';}
function syncBadge(){return '<span class="sync">'+ic("refresh",12)+'Synced ze Selfly Store · dnes 8:14</span>';}

/* ================= state / nav ================= */
var state={tab:"prehled",sel:null,sub:null,q:"",cat:"Vše"};
var NAV=[
 {id:"prehled",label:"Přehled",icon:"dashboard"},
 {id:"lednice",label:"Lednice",icon:"fridge"},
 {id:"trasy",label:"Trasy",icon:"truck"},
 {id:"misto",label:"Nové místo",icon:"compass"},
 {id:"sortiment",label:"Sortiment",icon:"tag"},
 {id:"nastaveni",label:"Nastavení",icon:"settings"}
];
function go(tab){state.tab=tab;state.sel=null;state.sub=null;render();}
function toast(msg){var t=document.createElement("div");t.className="toast";t.innerHTML=ic("check",16)+" "+esc(msg);document.body.appendChild(t);setTimeout(function(){t.remove();},2000);}

/* ================= views ================= */
function statBox(l,v,x,accent){return '<div class="card stat"><div class="l">'+esc(l)+'</div><div class="v"'+(accent?' style="color:'+accent+'"':'')+'>'+v+'</div>'+(x?'<div class="x">'+esc(x)+'</div>':'')+'</div>';}

function viewPrehled(){
 var act=FRIDGES.filter(function(f){return f.status==="aktivní";});
 var total=act.reduce(function(a,f){return a+(ff(f)?ff(f).net:0);},0);
 var al=alerts(); var restock=new Set(al.map(function(a){return a.fid;})).size;
 var now=new Date().getMonth();
 var maxTrend=total*1.08||1;
 var trend='';
 for(var i=0;i<6;i++){var m=(now-5+i+12)%12;var val=total*(0.55+i*0.09);var h=Math.max(4,(val/maxTrend)*150);
  trend+='<div class="col"><i style="height:'+h+'px;background:'+C.greenLt+';max-width:34px"></i><span>'+MONTHS[m]+'</span></div>';}
 var maxF=Math.max.apply(null,act.map(function(f){return ff(f).net;}).concat([1]));
 var bars=act.map(function(f){var n=ff(f).net;var col=n>=15000?C.green:n>0?C.amber:C.red;
  return '<div class="hbar"><span class="nm">'+esc(f.name.split(" ")[0])+'</span><div class="tk"><i style="width:'+Math.max(2,(n/maxF)*100)+'%;background:'+col+'"></i></div><span class="vl">'+fmt(n/1000)+'k</span></div>';}).join('');
 var cards=act.map(function(f){var fi=ff(f);var v=verdict(fi.net);
  return '<button class="fcard" onclick="openFridge('+f.id+')"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><div><div style="font-weight:700">'+esc(f.name)+'</div><div class="muted" style="font-size:12px;display:flex;align-items:center;gap:4px;margin-top:2px">'+ic("pin",12)+esc(f.city)+' · '+esc(f.route)+'</div></div>'+pill(v.t.split(" ")[0],v.c)+'</div><div style="display:flex;gap:16px;margin-top:12px;font-size:14px"><div><div class="muted" style="font-size:11px">zisk/měs</div><div style="font-weight:700;color:'+C.green+'">'+fmt(fi.net)+' Kč</div></div><div><div class="muted" style="font-size:11px">prodejů/den</div><div style="font-weight:700">'+fi.npd+'</div></div><div><div class="muted" style="font-size:11px">break-even</div><div style="font-weight:700">'+fi.be.toFixed(1)+'/den</div></div></div></button>';}).join('');
 return '<div class="head"><div><h1>Přehled</h1><div class="sub">Ekonomika celého portfolia</div></div>'+syncBadge()+'</div>'
  +(restock>0?'<button onclick="go(\'trasy\')" style="width:100%;text-align:left;padding:12px;border-radius:12px;margin-bottom:16px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;cursor:pointer;background:rgba(190,122,27,.1);border:1px solid rgba(190,122,27,.35);color:'+C.amber+'">'+ic("truck",16)+'Selfly hlásí '+al.length+' položek k doplnění na '+restock+' lednicích — naplánovat trasu →</button>':'')
  +'<div class="row" style="margin-bottom:20px">'+statBox("Aktivní lednice",act.length)+statBox("Čistý zisk / měsíc",fmt(total)+" Kč","po dani, dle modelu",C.green)+statBox("Čistý zisk / rok",fmt(total*12)+" Kč","při dnešním portfoliu")+statBox("Průměr na lednici",fmt(act.length?total/act.length:0)+" Kč","měsíčně")+'</div>'
  +'<div class="grid g2" style="margin-bottom:12px"><div class="card"><div style="font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px">'+ic("trending",16)+'Vývoj čistého zisku (6 měsíců)</div><div class="chart">'+trend+'</div></div><div class="card"><div style="font-weight:700;margin-bottom:12px">Zisk podle lednice (Kč/měs)</div>'+bars+'</div></div>'
  +'<div style="font-weight:700;margin:16px 0 8px">Lednice</div><div class="grid g2">'+cards+'</div>';
}

function viewLednice(){
 if(state.sub==="add")return viewFridgeForm(null);
 var cards=FRIDGES.map(function(f){var fi=ff(f);var isA=f.status==="aktivní";

}
function setS(k,val,pct){S[k]=pct?(parseFloat(val)||0)/100:(parseFloat(val)||0);save("settings",S);render();}
function resetAll(){if(!confirm("Obnovit vše na ukázková data? Smaže tvé změny."))return;localStorage.removeItem("biteo_settings");localStorage.removeItem("biteo_catalog");localStorage.removeItem("biteo_fridges");S=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));CATALOG=JSON.parse(JSON.stringify(DEFAULT_CATALOG));FRIDGES=JSON.parse(JSON.stringify(DEFAULT_FRIDGES));toast("Obnoveno");render();}

/* ================= render ================= */
function render(){
 var al=alerts();var restock=new Set(al.map(function(a){return a.fid;})).size;
 // sidebar
 var sb='<div class="logo"><div class="b">B</div><div><div class="t">Biteo</div><div class="s">ekonomický velín</div></div></div>';
 NAV.forEach(function(n){var badge=(n.id==="trasy"&&restock)?'<span class="badge">'+restock+'</span>':'';sb+='<button class="navbtn '+(state.tab===n.id?'on':'')+'" onclick="go(\''+n.id+'\')">'+ic(n.icon)+'<span style="flex:1">'+n.label+'</span>'+badge+'</button>';});
 sb+='<div class="foot">Prototyp · data ze Selfly (mock)</div>';
 document.getElementById("sidebar").innerHTML=sb;
 // bottom nav
 var bn='';NAV.forEach(function(n){var badge=(n.id==="trasy"&&restock)?'<span class="badge">'+restock+'</span>':'';bn+='<button class="'+(state.tab===n.id?'on':'')+'" onclick="go(\''+n.id+'\')"><div style="position:relative">'+ic(n.icon)+badge+'</div><span>'+n.label+'</span></button>';});
 document.getElementById("bottomnav").innerHTML=bn;
 // main
 var v="";
 if(state.tab==="prehled")v=viewPrehled();
 else if(state.tab==="lednice")v=state.sel?viewDetail():viewLednice();
 else if(state.tab==="trasy")v=viewTrasy();
 else if(state.tab==="misto")v=viewMisto();
 else if(state.tab==="sortiment")v=viewSortiment();
 else if(state.tab==="nastaveni")v=viewNastaveni();
 document.getElementById("main").innerHTML=v;
}
render();
</script>
